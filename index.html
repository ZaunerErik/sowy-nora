<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Für dich • Tut mir leid</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #242424;
            --accent-color: #ffb3c1;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Fade-In Animation */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.2s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.6s; }

        /* Container */
        .wrapper {
            max-width: 650px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Hero Section */
        header {
            text-align: center;
            padding: 60px 0 40px 0;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        header .heart {
            color: var(--accent-color);
            font-size: 1.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Brief-Karte */
        .letter-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 179, 193, 0.1);
            margin-bottom: 40px;
        }

        .letter-card p {
            margin-bottom: 20px;
            color: #e0e0e0;
            font-size: 1.1rem;
            white-space: pre-line; /* Behält Zeilenumbrüche aus dem Code bei */
        }

        /* Foto-Bereich (Optional) */
        .moments {
            text-align: center;
            margin-bottom: 40px;
        }

        .moments h2 {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .image-grid img {
            width: 100%;
            border-radius: 12px;
            filter: grayscale(20%);
            transition: filter 0.3s ease;
        }

        .image-grid img:hover {
            filter: grayscale(0%);
        }

        /* Interaktiver Button */
        .action-area {
            text-align: center;
            padding: 20px 0;
        }

        .btn {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(255, 179, 193, 0.4);
        }

        .hidden-message {
            margin-top: 20px;
            font-style: italic;
            color: var(--accent-color);
            display: none;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <header class="fade-in">
            <h1>Hi...</h1>
            <div class="heart">♥</div>
        </header>

        <main>
            <!-- Der Entschuldigungsbrief -->
            <section class="letter-card fade-in delay-1">
                <p>
                    Nora es duad ma lad das i a fiesi wor <3
                </p>
            </section>

            <!-- Interaktiver Footer -->
            <section class="action-area fade-in delay-2">
                <button class="btn" onclick="acceptApology()">Verzeihen?</button>
                <div class="hidden-message" id="successMessage">
                    Danke. ❤️
                </div>
            </section>
        </main>

    </div>

    <script>
        function acceptApology() {
            const message = document.getElementById('successMessage');
            message.style.display = 'block';
            message.classList.add('fade-in');
            
            // Kleiner Konfetti-Effekt im Button-Text
            const btn = document.querySelector('.btn');
            btn.innerText = '✓ Danke dir';
            btn.style.backgroundColor = 'rgba(255, 179, 193, 0.2)';
            btn.disabled = true;
        }
    </script>
</body>
</html>
